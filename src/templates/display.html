<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minkipi Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        .display-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .display-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        /* Optional: show timestamp on hover */
        .timestamp {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        body:hover .timestamp {
            opacity: 1;
        }
    </style>
    <script>
        const refreshIntervalMs = 3000;

        function refreshImage() {
            const img = document.getElementById('displayImage');
            if (!img) return;

            // Cache-busting query param — matches working dashboard approach
            img.src = '/api/current_image?t=' + Date.now();
        }

        document.addEventListener('DOMContentLoaded', function() {
            refreshImage();
            setInterval(refreshImage, refreshIntervalMs);
        });
    </script>
</head>
<body>
    <div class="display-container">
        <img id="displayImage" src="{{ url_for('static', filename='images/current_image.png') }}" alt="Current Display">
    </div>
    <div class="timestamp" id="timestamp"></div>
</body>
</html>
