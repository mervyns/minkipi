<div class="form-group">
    <label for="autoRefresh" class="form-label">Auto Refresh:</label>
    <select id="autoRefresh" name="autoRefresh" class="form-input">
        <option value="0">Off</option>
        <option value="1">Every 1 minute</option>
        <option value="5">Every 5 minutes</option>
        <option value="10">Every 10 minutes</option>
        <option value="15">Every 15 minutes</option>
        <option value="30">Every 30 minutes</option>
        <option value="60" selected>Every 1 hour</option>
        <option value="120">Every 2 hours</option>
        <option value="240">Every 4 hours</option>
    </select>
    <small style="flex-basis: 100%; margin-top: 2px; color: var(--text-secondary, #888);">How often to re-fetch while this plugin is displayed</small>
</div>

<div class="form-group nowrap">
    <label for="comic" class="form-label">Comic:</label>
    <select id="comic" name="comic" class="form-input">
        {% for comic in comics %}
        <option value="{{comic}}">{{comic}}</option>
        {% endfor %}
    </select>
</div>

<div class="form-group">
    <div class="form-group">
        <label for="titleCaption" class="form-label">Show Comic Title and Caption:</label>
        <div class="toggle-container">
            <input type="checkbox" id="titleCaption" name="titleCaption" class="toggle-checkbox" value="true" checked onclick="this.value=this.checked ? 'true' : 'false';">
            <label for="titleCaption" class="toggle-label"></label>
        </div>
    </div>

    <div class="form-group">
        <label for="fontSize" class="form-label">Font Size:</label>
        <select id="fontSize" name="fontSize" class="form-input"">
            <option value="12">12</option>
            <option value="14" selected="selected">14</option>
            <option value="16">16</option>
            <option value="18">18</option>
            <option value="20">20</option>
        </select>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (loadPluginSettings) {
            document.getElementById('comic').value = pluginSettings.comic || 'xkcd';
            document.getElementById('titleCaption').checked = pluginSettings.titleCaption || false;
            document.getElementById('fontSize').value = pluginSettings.fontSize || '14';
            document.getElementById('autoRefresh').value = pluginSettings?.autoRefresh || '60';
        }
    });
</script>
