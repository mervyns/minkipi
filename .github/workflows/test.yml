name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get install -y libopenjp2-7 libtiff6 libatlas-base-dev

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r install/requirements.txt pytest

      - name: Run tests
        run: pytest --tb=short -q
